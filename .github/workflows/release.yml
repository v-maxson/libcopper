name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-gcc,     os: ubuntu-latest,  configure_flags: "-DCMAKE_C_COMPILER=gcc" }
          - { name: macos-clang,   os: macos-latest,   configure_flags: "" }
          - { name: windows-msvc,  os: windows-latest, configure_flags: "" }
          - { name: windows-mingw, os: windows-latest, configure_flags: "-G 'MinGW Makefiles' -DCMAKE_C_COMPILER=gcc", add_mingw: true }

    steps:
      - uses: actions/checkout@v7

      - name: Add MinGW to PATH
        if: matrix.add_mingw
        run: echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH
        shell: bash

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCOPPER_BUILD_TESTS=OFF
          -DCOPPER_BUILD_EXAMPLES=OFF
          ${{ matrix.configure_flags }}
        shell: bash

      - name: Build
        run: cmake --build build --config Release
        shell: bash

      # Install headers + compiled lib into a staging directory, then zip it.
      # python3 shutil is used for zipping since it works on all platforms.
      - name: Install
        run: cmake --install build --prefix staging --config Release
        shell: bash

      - name: Package
        run: python3 -c "import shutil; shutil.make_archive('libcopper-${{ github.ref_name }}-${{ matrix.name }}', 'zip', 'staging')"
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: libcopper-${{ github.ref_name }}-${{ matrix.name }}
          path: libcopper-${{ github.ref_name }}-${{ matrix.name }}.zip
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts

      # If the release was created via the GitHub UI (which also creates the tag),
      # it already exists — just upload the assets. Otherwise create it from scratch.
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view ${{ github.ref_name }} --repo ${{ github.repository }} > /dev/null 2>&1; then
            gh release upload ${{ github.ref_name }} \
              --repo ${{ github.repository }} \
              --clobber \
              artifacts/*.zip
          else
            gh release create ${{ github.ref_name }} \
              --repo ${{ github.repository }} \
              --title "Release ${{ github.ref_name }}" \
              --generate-notes \
              artifacts/*.zip
          fi
